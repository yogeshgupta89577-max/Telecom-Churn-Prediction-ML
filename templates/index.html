<!DOCTYPE html>
<html>
<head>
    <title>AI Telecom Churn Predictor</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 30px 0;
        }

        .container {
            width: 420px;
            padding: 25px;
            border-radius: 20px;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(20px);
            box-shadow: 0 15px 50px rgba(0,0,0,0.6);
            color: white;
            animation: fadeIn 1s ease;
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(20px);}
            to {opacity: 1; transform: translateY(0);}
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header img {
            width: 55px;
            margin-bottom: 10px;
            animation: float 3s infinite ease-in-out;
        }

        @keyframes float {
            0%,100% {transform: translateY(0);}
            50% {transform: translateY(-5px);}
        }

        .header h1 {
            font-size: 24px;
        }

        .header p {
            font-size: 13px;
            opacity: 0.8;
        }

        label {
            font-size: 13px;
            margin-top: 10px;
            display: block;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 10px;
            border: none;
            outline: none;
            background: rgba(255,255,255,0.9);
        }

        input:focus, select:focus {
            box-shadow: 0 0 8px #00c6ff;
        }

        button {
            width: 100%;
            margin-top: 18px;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(90deg, #00c6ff, #0072ff);
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 15px;
            background: rgba(0,0,0,0.4);
        }

        .bar {
            height: 12px;
            border-radius: 10px;
            margin-top: 5px;
            transition: 0.5s;
        }

        .stay {
            background: linear-gradient(90deg, limegreen, green);
        }

        .churn {
            background: linear-gradient(90deg, red, darkred);
        }

        .footer {
            margin-top: 10px;
            font-size: 12px;
            text-align: center;
            opacity: 0.6;
        }

    </style>
</head>

<body>

<div class="container">

    <div class="header">
        <img src="https://cdn-icons-png.flaticon.com/512/483/483947.png">
        <h1>AI Telecom Churn Predictor</h1>
        <p>Smart ML-based Customer Retention Analysis</p>
    </div>

    <form action="/predict" method="post">

        <label>Gender</label>
        <select name="gender">
            <option>Male</option>
            <option>Female</option>
        </select>

        <label>Senior Citizen</label>
        <select name="SeniorCitizen">
            <option value="0">No</option>
            <option value="1">Yes</option>
        </select>

        <label>Has Partner</label>
        <select name="Partner">
            <option>Yes</option>
            <option>No</option>
        </select>

        <label>Dependents</label>
        <select name="Dependents">
            <option>Yes</option>
            <option>No</option>
        </select>

        <label>Tenure (months)</label>
        <input type="number" name="tenure" placeholder="e.g. 12" required>

        <label>Phone Service</label>
        <select name="PhoneService">
            <option>Yes</option>
            <option>No</option>
        </select>

        <label>Internet Service</label>
        <select name="InternetService">
            <option>DSL</option>
            <option>Fiber optic</option>
            <option>No</option>
        </select>

        <label>Contract</label>
        <select name="Contract">
            <option>Month-to-month</option>
            <option>One year</option>
            <option>Two year</option>
        </select>

        <label>Monthly Charges</label>
        <input type="number" name="MonthlyCharges" placeholder="e.g. 50" required>

        <label>Total Charges</label>
        <input type="number" name="TotalCharges" placeholder="e.g. 2000" required>

        <button type="submit">🚀 Predict</button>

    </form>

    {% if prediction_text %}
    <div class="result">
        <h3>{{ prediction_text }}</h3>

        <p>Stay Probability: {{ stay_prob }}</p>
        <div class="bar stay" style="width: {{ stay_prob * 100 }}%"></div>

        <p>Churn Probability: {{ churn_prob }}</p>
        <div class="bar churn" style="width: {{ churn_prob * 100 }}%"></div>
    </div>
    {% endif %}

    <div class="footer">
        Powered by Machine Learning 🚀
    </div>

</div>

</body>
</html>
